<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Wallet — Test App</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: #0a0a0b; color: #e4e4e7; padding: 32px; max-width: 720px; margin: 0 auto;
		}
		h1 { font-size: 24px; margin-bottom: 8px; }
		.subtitle { color: #71717a; margin-bottom: 24px; font-size: 14px; }
		.card {
			background: #18181b; border: 1px solid #27272a; border-radius: 12px;
			padding: 20px; margin-bottom: 16px;
		}
		.card h2 { font-size: 15px; color: #a1a1aa; margin-bottom: 12px; font-weight: 500; }
		.status {
			display: flex; align-items: center; gap: 8px; font-size: 14px;
		}
		.dot {
			width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
		}
		.dot.green { background: #22c55e; }
		.dot.red { background: #ef4444; }
		.dot.yellow { background: #eab308; }
		button {
			background: #3b82f6; color: white; border: none; border-radius: 8px;
			padding: 10px 20px; font-size: 14px; cursor: pointer; margin-top: 8px;
			transition: background 0.15s;
		}
		button:hover { background: #2563eb; }
		button:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
		#log {
			background: #09090b; border: 1px solid #27272a; border-radius: 8px;
			padding: 16px; font-family: "SF Mono", Monaco, monospace; font-size: 12px;
			line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap;
			color: #a1a1aa;
		}
		.log-info { color: #60a5fa; }
		.log-ok { color: #4ade80; }
		.log-err { color: #f87171; }
		.log-data { color: #c084fc; }
	</style>
</head>
<body>
	<h1>AI Wallet Test App</h1>
	<p class="subtitle">A minimal page to verify the browser extension is working</p>

	<div class="card">
		<h2>1. Wallet Detection</h2>
		<div class="status" id="detect-status">
			<span class="dot yellow"></span>
			<span>Checking...</span>
		</div>
		<button id="btn-detect" onclick="runDetect()">Re-check</button>
	</div>

	<div class="card">
		<h2>2. Connect</h2>
		<div class="status" id="connect-status">
			<span class="dot red"></span>
			<span>Not connected</span>
		</div>
		<button id="btn-connect" onclick="runConnect()" disabled>Connect to AI Wallet</button>
	</div>

	<div class="card">
		<h2>3. Test Completion</h2>
		<button id="btn-complete" onclick="runComplete()" disabled>Send "Hello!" to AI</button>
	</div>

	<div class="card">
		<h2>Event Log</h2>
		<div id="log"></div>
	</div>

	<script>
		const logEl = document.getElementById("log");

		function log(msg, cls = "") {
			const line = document.createElement("div");
			line.className = cls;
			line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
			logEl.appendChild(line);
			logEl.scrollTop = logEl.scrollHeight;
		}

		// ─── Step 1: Detect ──────────────────────────────────────

		async function runDetect() {
			const statusEl = document.getElementById("detect-status");
			log("Checking for window.aiWallet...", "log-info");

			if (!window.aiWallet) {
				statusEl.innerHTML = `<span class="dot red"></span><span>Not found — extension not installed or not loaded</span>`;
				log("window.aiWallet is undefined", "log-err");
				return false;
			}

			log("window.aiWallet found, calling detect()...", "log-info");

			try {
				const info = await window.aiWallet.detect();
				if (info) {
					statusEl.innerHTML = `<span class="dot green"></span><span>Detected! v${info.version} — capabilities: ${info.capabilities.join(", ")}</span>`;
					log(`Wallet detected: v${info.version}, capabilities: [${info.capabilities.join(", ")}]`, "log-ok");
					document.getElementById("btn-connect").disabled = false;
					return true;
				} else {
					statusEl.innerHTML = `<span class="dot red"></span><span>detect() returned null — extension may not be responding</span>`;
					log("detect() returned null", "log-err");
					return false;
				}
			} catch (err) {
				statusEl.innerHTML = `<span class="dot red"></span><span>Error: ${err.message}</span>`;
				log(`detect() threw: ${err.message}`, "log-err");
				return false;
			}
		}

		// ─── Step 2: Connect ─────────────────────────────────────

		let connection = null;

		async function runConnect() {
			const statusEl = document.getElementById("connect-status");
			log("Requesting access with appName: 'AI Wallet Test App'...", "log-info");

			try {
				const result = await window.aiWallet.connect({
					appName: "AI Wallet Test App",
					requestedProviders: ["openai", "anthropic"],
					requestedBudget: { amount: 100, period: "daily" },
				});

				connection = result;
				statusEl.innerHTML = `<span class="dot green"></span><span>Connected!</span>`;
				log(`Connected! Permissions: ${JSON.stringify(result, null, 2)}`, "log-ok");
				document.getElementById("btn-complete").disabled = false;
			} catch (err) {
				statusEl.innerHTML = `<span class="dot red"></span><span>${err.message}</span>`;
				log(`Connect failed: ${err.message} (code: ${err.code})`, "log-err");
				if (err.message.includes("not yet implemented")) {
					log("This is expected — the approval popup UI hasn't been built yet.", "log-info");
					log("To test further, grant permissions manually via the extension's storage.", "log-info");
				}
			}
		}

		// ─── Step 3: Completion ──────────────────────────────────

		async function runComplete() {
			log("Sending completion request...", "log-info");

			try {
				// This uses the SDK's postMessage protocol directly since
				// the full Connection class needs the SDK npm package.
				// For this test page we go through window.aiWallet which
				// only exposes detect/connect. A real app would use the SDK.
				log("Note: full completion requires the @ai-wallet/sdk package.", "log-info");
				log("The connect + detect flow above proves the extension<->page bridge works.", "log-data");
			} catch (err) {
				log(`Completion failed: ${err.message}`, "log-err");
			}
		}

		// ─── Auto-detect on load ─────────────────────────────────

		// Wait a tick for the content script to inject window.aiWallet
		setTimeout(() => runDetect(), 200);
	</script>
</body>
</html>
