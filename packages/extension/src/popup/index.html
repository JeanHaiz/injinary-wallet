<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f10;
      color: #e4e4e7;
    }
    #app { padding: 16px; }
    h1 { font-size: 18px; margin-bottom: 12px; }
    .status {
      padding: 12px;
      border-radius: 8px;
      background: #1c1c1f;
      margin-bottom: 12px;
    }
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .status-indicator.locked { background: #ef4444; }
    .status-indicator.unlocked { background: #22c55e; }
  </style>
</head>
<body>
  <div id="app">
    <h1>AI Wallet</h1>
    <div class="status">
      <span class="status-indicator locked"></span>
      <span>Wallet locked</span>
    </div>
    <p style="color: #71717a; font-size: 13px;">
      Extension shell. Full UI coming soon.
    </p>
  </div>
</body>
</html>
